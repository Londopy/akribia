name: Bug report
description: Report a reproducible problem
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `python -m akribia.tasks.illusion_task --profile ...`
        2. ...
    validations: { required: true }
  - type: input
    id: backend
    attributes:
      label: Backend
      description: Output of `python -c "from akribia import core; print(core.BACKEND)"`
  - type: input
    id: version
    attributes:
      label: Version / commit
