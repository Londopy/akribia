name: pages

# Deploys the frontend as a live, zero-install demo to GitHub Pages
# (https://londopy.github.io/akribia/). In the browser the app runs its built-in
# TypeScript engine fallback — the same equations as the Rust core — so the full
# dashboard works with no backend.
on:
  push:
    branches: [main]
    paths: ["gui/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: gui
      - name: Build for GitHub Pages
        run: npm run build
        working-directory: gui
        env:
          AKRIBIA_BASE: /akribia/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: gui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
