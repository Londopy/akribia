name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push cancels an older in-progress run instead of stacking them up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.78 (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.78.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- Rust core: format, lint, test ----
      - name: cargo fmt
        run: cargo fmt -p akribia-core -- --check

      - name: cargo clippy
        run: cargo clippy -p akribia-core -- -D warnings

      - name: cargo test
        run: cargo test -p akribia-core --lib

      # ---- Python layer: build the Rust extension + lint + test ----
      # `pip install -e` uses maturin as the build backend, which compiles
      # akribia._core in-place, so pytest exercises the real Rust core.
      - name: Install Python package (builds the Rust extension)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: pytest
        run: pytest tests/ -q
