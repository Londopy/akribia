name: gui
on:
  push: { paths: ["gui/**", ".github/workflows/gui.yml"] }
  pull_request: { paths: ["gui/**"] }
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
      - name: system deps for Tauri (linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: npm install
        run: cd gui && npm install
      - name: lint + typecheck frontend
        run: cd gui && npm run build --if-present
      - name: cargo check src-tauri
        run: cargo check -p akribia-gui
      - name: npm audit (spec 2.16)
        run: cd gui && npm audit --audit-level=high || true
