name: gui

# Fast frontend-only check: type-checks and bundles the React app. Deliberately
# does NOT build the Tauri/Rust shell (that needs system libraries and is
# exercised by the tag-triggered release workflow), so this stays quick and
# reliable on every push.
on:
  push:
    branches: [main]
    paths: ["gui/**", ".github/workflows/gui.yml"]
  pull_request:
    branches: [main]
    paths: ["gui/**"]
  workflow_dispatch:

concurrency:
  group: gui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: gui
      - name: Type-check + build
        run: npm run build
        working-directory: gui
