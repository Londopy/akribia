name: python
on:
  push: { paths: ["akribia/**", "tests/**", "core/**", "pyproject.toml", ".github/workflows/python.yml"] }
  pull_request: { paths: ["akribia/**", "tests/**", "core/**", "pyproject.toml"] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
      - name: install
        run: |
          python -m pip install --upgrade pip maturin
          pip install -e ".[dev]"
          maturin develop          # builds the real Rust core so tests exercise it
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy akribia || true   # advisory until the layer is fully typed
      - name: pytest
        run: pytest tests/ -v
      - name: pip-audit (spec 2.16)
        run: pip-audit || true
