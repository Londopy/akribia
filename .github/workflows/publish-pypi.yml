name: publish-pypi

# Builds binary wheels for Linux + Windows + macOS (so `pip install akribia`
# works with NO local Rust toolchain) plus an sdist, and uploads them all to
# PyPI using a token stored as the PYPI_API_TOKEN repository secret.
# Runs on a version tag (same tag that builds the desktop installers) or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  wheels:
    name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: windows-latest, target: x64 }
          - { runner: macos-14,       target: aarch64 }   # Apple Silicon
          - { runner: macos-13,       target: x86_64 }    # Intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          # On Linux, build for every CPython the manylinux image provides;
          # elsewhere build for the 3.11 set up above.
          args: >-
            --release --out dist
            ${{ matrix.platform.runner == 'ubuntu-latest' && '--find-interpreter' || '' }}
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # (Optional: create an "Environment: pypi" with a required reviewer in repo
    # settings and add `environment: pypi` here for a manual approval gate.)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
