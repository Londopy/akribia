name: build-wheels
on:
  push: { tags: ["v*"] }       # tag-triggered releases only (spec 2.8)
  workflow_dispatch: {}
jobs:
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with: { command: build, args: "--release --out dist" }
      - name: checksums (integrity, spec 2.16)
        shell: bash
        run: cd dist && (sha256sum * > SHA256SUMS.txt || shasum -a 256 * > SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        with: { name: wheels-${{ matrix.os }}, path: dist/* }
  publish:
    needs: wheels
    runs-on: ubuntu-latest
    # Required-reviewer protection on this environment means a tag push can build
    # automatically but the actual publish needs an explicit human approval (spec 2.16).
    environment: pypi-publish
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { password: "${{ secrets.PYPI_API_TOKEN }}" }
