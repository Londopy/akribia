name: rust
on:
  push: { paths: ["core/**", "Cargo.*", "rust-toolchain.toml", ".github/workflows/rust.yml"] }
  pull_request: { paths: ["core/**", "Cargo.*", "rust-toolchain.toml"] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt -p akribia-core -- --check
      - name: clippy
        run: cargo clippy -p akribia-core -- -D warnings
      - name: test
        run: cargo test -p akribia-core --lib
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
      - name: install audit tools
        run: cargo install cargo-audit cargo-deny --locked
      - name: cargo audit
        run: cargo audit
      - name: cargo deny (advisories + licenses — catches GPL ingress, spec 1.7/2.16)
        run: cargo deny check
