# cargo-deny config (spec 1.7 / 2.16). The licenses gate is the load-bearing one:
# it fails the build if any dependency — direct or transitive — is GPL-licensed,
# which would obligate the MIT-licensed core under GPL (the TAPAS boundary concern).
[advisories]
yanked = "deny"

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0", "Zlib", "MPL-2.0", "CC0-1.0"]
confidence-threshold = 0.9
# Note the absence of GPL-*/AGPL-* from `allow`: any such license fails the build.

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
